  <meta name="msapplication-TileColor" content="#111827">
  <meta name="msapplication-tap-highlight" content="no">
  
  <title>Blo|<Chain0racle - Enterprise Platform</title>
  
  <!-- Favicon from /Logo/favicon/ -->
  <link rel="icon" type="image/png" sizes="32x32" href="/Logo/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/Logo/favicon/favicon-16x16.png">

  <!-- Fonts: Montserrat for logo typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script>
    (function() {
      const CACHE_VERSION_KEY = 'sw-cache-version';
      const CURRENT_CACHE_VERSION = 'v2.0.2';
      const urlParams = new URLSearchParams(window.location.search);
      const isRefresh = urlParams.has('_refresh');
      
      if (isRefresh) {
        console.log('[Cache] Forced refresh detected - clearing session storage');
        sessionStorage.clear();
        localStorage.setItem(CACHE_VERSION_KEY, CURRENT_CACHE_VERSION);
        localStorage.setItem('last-refresh', Date.now().toString());
        
        if (window.history && window.history.replaceState) {
          const cleanUrl = window.location.pathname + window.location.hash;
          window.history.replaceState({}, document.title, cleanUrl);
        }
      }
      
      // Note: Version checking is handled by cacheManager.ts in App.tsx
      // to ensure thorough cache clearing before updating the version key.
      void document.documentElement.offsetHeight;
    })();
  </script>
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
