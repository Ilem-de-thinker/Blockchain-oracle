  <script>
    (function() {
      const CACHE_VERSION_KEY = 'sw-cache-version';
      const CURRENT_CACHE_VERSION = 'v2.0.2';
      const urlParams = new URLSearchParams(window.location.search);
      const isRefresh = urlParams.has('_refresh');
      
      if (isRefresh) {
        console.log('[Cache] Forced refresh detected - clearing session storage');
        sessionStorage.clear();
        localStorage.setItem(CACHE_VERSION_KEY, CURRENT_CACHE_VERSION);
        localStorage.setItem('last-refresh', Date.now().toString());
        
        if (window.history && window.history.replaceState) {
          const cleanUrl = window.location.pathname + window.location.hash;
          window.history.replaceState({}, document.title, cleanUrl);
        }
      }
      
      // Note: Version checking is handled by cacheManager.ts in App.tsx
      // to ensure thorough cache clearing before updating the version key.
      void document.documentElement.offsetHeight;
    })();
  </script>
